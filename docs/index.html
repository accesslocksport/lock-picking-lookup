<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="pico.classless.min.css">
  <style type="text/css">
    ul li {
      list-style-type: none;
    }
    li:before {
      content: "\1F512";
      position: relative;
      left: -10px;
    }
    h1 {
      margin-bottom: 0;
      text-align: center;
    }
    main {
      padding-top: 0 !important;
    }
  </style>
</head>
<body>
  <header>
      <h1>LockPickingLookup</h1>
  </header>
  <main>
    <input type="text" name="search" id="search-input" placeholder="Enter 3+ characters of a lock name, brand or type...">
    <ul id="search-target"></ul>
  </main>
  <script type="text/javascript" src="script.js"></script>
  <script>
    window.onload = (event) => {
      search.init('#search-input', '#search-target')
    }
  </script>
</body>
</html>
