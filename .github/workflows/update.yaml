on:
  workflow_dispatch:
  schedule:
    - cron: '6 19 * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Scrape data
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' 
      run: |-
        python -m pip install pipenv
        pipenv install
        pipenv run python gather_metadata.sh

    - name: Commit and push if it changed
      run: |-
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        timestamp=$(date -u)
        git commit -m "Update Feed: ${timestamp}" || exit 0
        git push
