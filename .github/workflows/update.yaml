on:
  workflow_dispatch:
  schedule:
    - cron: '6 19 * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Scrape data
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |-
          python -m pip install pipenv
          pipenv install
          pipenv run python gather_metadata.py

      - name: Commit and push if it changed
        uses: actions/checkout@v3
        run: |-
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          timestamp=$(date -u)
          git commit -m "Update Feed: ${timestamp}" || exit 0
          git push
